[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "slashdocs"
version = "0.1.0"
description = "Auto-generated MDX command docs for discord.py bots — attach one line and your commands page writes itself on startup."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "dorochadev" }]
keywords = ["discord", "discord.py", "documentation", "mdx", "docs-generator"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Documentation",
]
dependencies = ["discord.py>=2.4,<3"]

[project.urls]
Repository = "https://github.com/dorochadev/slashdocs"

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.24",
  "pytest-cov>=5",
  "ruff>=0.8",
  "mypy>=1.13",
]

[tool.hatch.build.targets.wheel]
packages = ["src/slashdocs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
files = ["src"]

[tool.coverage.run]
source = ["slashdocs"]
